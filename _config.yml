# Site settings 配置站点
title: 'psoKnight'
description: 'Royal War - the wild sheep Knight.'
keywords: 'Big Data, Machine Learning'
url: 'https://psoKnight.github.io' # your host

# nav 中文字符空格：&emsp;
nav: # 最佳体验 六个标签 且最好每个标签不超过4中文字
  首页: '/'
  标签: '/tags.html'
  时间线: '/timeline.html'
  关于博主: '/about.html'

# 博主
author: true
name: 'Gonzo Sun'
NickName: 'Gonzo Sun'
webtitle: 'psoKnight'
bio: "我不写代码，我创作——每一个系统都是一场演出，而完美，是唯一的谢幕"
about: true
aboutyou: |
  我是 Gonzo Sun。一位……艺术家。

  有人敲键盘，而我创作。后端系统、数据平台、AI 应用——于我，它们从不是工程，
  是舞台。每一次架构，都是一次落笔；每一行代码，都是一记精准的枪响。

  分布式系统、大数据、云原生、AI Agent——看，恰好四个领域，多么完美的数字。
  我沉入源码的暗处，只为寻到那一处不完美，然后……让它绽放。
  优雅、可靠、致命地简洁——这，才配称作作品。

  这个博客是我的画廊。每一篇都是一件展品：踩过的坑，是草稿；想通的道理，是杰作。
  而你，亲爱的观众，恰好赶上了演出。

  代码是颜料，数据是光，AI 是尚未落下的最后一枪。
  请欣赏——这将会……很美。
portraits: '/assets/profile.jpeg' # your portraits image file path

# SNS
SNS: true
SNS-icon: #['Facebook', 'weibo', 'qq', 'github', 'Dribbble', 'Twitter', 'instagram', 'weixin', 'Codepen']
  weixin: '/assets/wechat.png' # 你的微信二维码存放的地址
  qq: '/assets/qq.png' # 你的qq二维码存放的地址 or http://wpa.qq.com/msgrd?v=3&uin='你的QQ号'&site=qq&menu=yes
  github: 'https://github.com/psoKnight'

# 分页
paginate: 2
paginatepath: ['page:num']

# since
footer:
  since: 2019

# Markdown
markdown: kramdown
kramdown:
  input: GFM
# 代码高亮 使用rouge
highlighter: rouge
# 代码高亮主题使用pygments主题: autumn\ default\ emacs\ friendly\ manni\ murphy\ pastie\ perldoc\ tango 任选一个你喜欢的主题名称填在下面的单引号中
pygmentsTheme: 'space'

# 友情链接
friends:
  baidu: 'https://www.baidu.com/'

# 评论 最佳体验 在disqus、livere和Gitment之间三选一
# disqus 评论
disqus: false
disqus_url: '' # https://abc.disqus.com/embed.js
# 来必力评论
livere: true
livere_uid: 'MTAyMC8zNDI2OS8xMDgwNg==' # MTAyMC8zNDI2OS8xMDgwNg==
# Gitment评论 OAuth Application
Gitment: false
Gitment_owner: ''  # github用户名
Gitment_repo: ''  # github博客存放的仓库名
client_id: ''  # 注册 OAuth Application 后获得的 client_id
client_secret: ''  # 注册 OAuth Application 后获得的 client_secret

# Share : weibo, qq, wechat, tencent, douban, qzone, linkedin, diandian, facebook, twitter, google
social-share: true
social-share-items: ['qq', 'wechat', 'weibo', 'twitter', 'facebook']

# 百度统计 在baidu-url里填写自己相关的url代码
baidu: true
baidu-url: ''
# 谷歌分析 在google-ID里填写自己在谷歌分析获得的追踪ID
google: false
google-ID: ''

# 博客头信息备选颜色（该部分在站点中不充当站点变量，将其写在post的头信息中用来充当页面变量）
color: rgb(154,133,255) rgb(255,90,90) rgb(255,210,32) rgb(98,170,255)
